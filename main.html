<!DOCTYPE html>
<html lang="vi" class="h-full scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TTDHS_HVA - Trung tâm Điều hành số THPT Hòa Vang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { deep: '#070A13', teal: '#0D9488', glow: '#2DD4BF' } } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal-fixed { position: fixed; bottom: 0; left: 0; right: 0; z-index: 60; background: #070A13; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 2rem 2rem 0 0; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-active { transform: translateY(0); }
    </style>
</head>
<body class="h-full bg-brand-deep text-slate-100 overflow-x-hidden">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-40 bg-brand-deep/80 backdrop-blur-xl border-b border-white/5 px-4 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-teal to-indigo-500 p-0.5 flex items-center justify-center">
                <div class="w-full h-full bg-brand-deep rounded-[10px] flex items-center justify-center font-bold text-brand-glow text-xs">HVA</div>
            </div>
            <div>
                <h1 class="text-[10px] font-semibold text-slate-400 uppercase tracking-widest">Trung tâm Điều hành số</h1>
                <p class="text-sm font-bold text-white tracking-tight">TTDHS_HVA</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 pb-24 px-4 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <!-- 8 Mục chính -->
            <div onclick="openModal('document-modal')" class="p-4 rounded-2xl bg-white/[0.03] border border-white/10 hover:border-brand-glow cursor-pointer transition-all">
                <i class="bi bi-folder-fill text-blue-400 text-2xl mb-2 block"></i>
                <h3 class="font-bold text-sm">Văn bản</h3>
            </div>
            <div onclick="openModal('academic-modal')" class="p-4 rounded-2xl bg-white/[0.03] border border-white/10 hover:border-brand-glow cursor-pointer transition-all">
                <i class="bi bi-journal-bookmark-fill text-teal-400 text-2xl mb-2 block"></i>
                <h3 class="font-bold text-sm">Chuyên môn</h3>
            </div>
            <div onclick="openModal('competition-modal')" class="p-4 rounded-2xl bg-white/[0.03] border border-white/10 hover:border-brand-glow cursor-pointer transition-all">
                <i class="bi bi-trophy-fill text-amber-400 text-2xl mb-2 block"></i>
                <h3 class="font-bold text-sm">Thi đua</h3>
            </div>
            <div onclick="openModal('digital-modal')" class="p-4 rounded-2xl bg-white/[0.03] border border-white/10 hover:border-brand-glow cursor-pointer transition-all">
                <i class="bi bi-cpu-fill text-cyan-400 text-2xl mb-2 block"></i>
                <h3 class="font-bold text-sm">Chuyển đổi số</h3>
            </div>
            <div onclick="openModal('quality-modal')" class="p-4 rounded-2xl bg-white/[0.03] border border-white/10 hover:border-brand-glow cursor-pointer transition-all">
                <i class="bi bi-patch-check-fill text-rose-400 text-2xl mb-2 block"></i>
                <h3 class="font-bold text-sm">Chất lượng</h3>
            </div>
            <div onclick="openModal('youth-modal')" class="p-4 rounded-2xl bg-white/[0.03] border border-white/10 hover:border-brand-glow cursor-pointer transition-all">
                <i class="bi bi-flag-fill text-red-400 text-2xl mb-2 block"></i>
                <h3 class="font-bold text-sm">Đoàn trường</h3>
            </div>
            <div onclick="openModal('report-modal')" class="p-4 rounded-2xl bg-white/[0.03] border border-white/10 hover:border-brand-glow cursor-pointer transition-all">
                <i class="bi bi-file-earmark-text text-orange-400 text-2xl mb-2 block"></i>
                <h3 class="font-bold text-sm">Báo cáo</h3>
            </div>
            <div onclick="openModal('team-modal')" class="p-4 rounded-2xl bg-white/[0.03] border border-white/10 hover:border-brand-glow cursor-pointer transition-all">
                <i class="bi bi-people-fill text-indigo-400 text-2xl mb-2 block"></i>
                <h3 class="font-bold text-sm">Đội ngũ</h3>
            </div>
        </div>
    </main>

    <!-- Modal Backdrop -->
    <div id="modal-backdrop" onclick="closeModal()" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity"></div>

    <!-- Modals (Ví dụ 1 modal, thầy nhân bản cho các mục khác) -->
    <div id="document-modal" class="modal-fixed h-[80vh] overflow-y-auto">
        <div class="p-6">
            <h2 class="text-xl font-bold mb-4">Văn bản & Biểu mẫu</h2>
            <p class="text-slate-400 text-sm">Nội dung chi tiết về văn bản sẽ hiển thị tại đây.</p>
            <button onclick="closeModal()" class="mt-6 w-full py-3 bg-brand-teal rounded-xl font-bold text-white">Đóng</button>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.add('modal-active');
            document.getElementById('modal-backdrop').classList.remove('opacity-0', 'pointer-events-none');
        }
        function closeModal() {
            document.querySelectorAll('.modal-fixed').forEach(m => m.classList.remove('modal-active'));
            document.getElementById('modal-backdrop').classList.add('opacity-0', 'pointer-events-none');
        }
    </script>
</body>
</html>
