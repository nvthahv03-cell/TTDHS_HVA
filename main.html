<!DOCTYPE html>
<html lang="vi" class="h-full scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TTDHS_HVA - Trung tâm Điều hành số THPT Hòa Vang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            deep: '#070A13',
                            primary: '#0F172A',
                            accent: '#1E293B',
                            teal: '#0D9488',
                            glow: '#2DD4BF'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-pb { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }
        .safe-pt { padding-top: calc(1rem + env(safe-area-inset-top)); }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.03); } }
        .animate-glow { animation: pulse-glow 4s infinite ease-in-out; }
    </style>
</head>
<body class="h-full bg-brand-deep text-slate-100 overflow-x-hidden antialiased select-none">

    <!-- Background Decoration -->
    <div class="fixed inset-0 -z-50 overflow-hidden bg-gradient-to-br from-brand-deep via-slate-950 to-brand-deep">
        <div class="absolute -top-[20%] -left-[10%] w-[80%] h-[60%] rounded-full bg-teal-500/10 blur-[120px] animate-glow"></div>
        <div class="absolute top-[40%] -right-[20%] w-[90%] h-[70%] rounded-full bg-indigo-500/10 blur-[150px] animate-glow" style="animation-delay: 2s;"></div>
    </div>

    <div class="flex flex-col min-h-screen">
        <header class="fixed top-0 left-0 right-0 z-40 bg-brand-deep/70 backdrop-blur-xl border-b border-white/5 px-4 py-3 safe-pt flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-teal to-indigo-500 p-0.5 shadow-lg shadow-brand-teal/20 flex items-center justify-center">
                    <div class="w-full h-full bg-brand-deep rounded-[10px] flex items-center justify-center">
                        <span class="text-brand-glow font-bold text-xs">HVA</span>
                    </div>
                </div>
                <div>
                    <h1 class="text-[9px] font-semibold text-slate-400 uppercase tracking-widest leading-none">Trung tâm Điều hành số</h1>
                    <p class="text-sm font-bold text-white tracking-tight">TTDHS_HVA</p>
                </div>
            </div>
            <button onclick="openModal('profile-modal')" class="w-9 h-9 rounded-full border border-white/10 overflow-hidden bg-slate-800">
                <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=100" alt="Avatar" class="w-full h-full object-cover">
            </button>
        </header>

        <main class="flex-1 px-4 pt-24 safe-pb overflow-y-auto">
            <section id="install-banner" class="mb-4 hidden">
                <div class="p-4 rounded-2xl bg-gradient-to-r from-brand-teal/20 to-indigo-600/25 border border-brand-glow/30 backdrop-blur-md flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-xl bg-brand-glow/10 flex items-center justify-center text-brand-glow"><i class="bi bi-phone-vibrate text-xl animate-bounce"></i></div>
                        <div>
                            <h4 class="text-xs font-bold text-white">Cài đặt Ứng dụng</h4>
                            <p class="text-[11px] text-teal-200/80">Thêm nhanh vào màn hình chính</p>
                        </div>
                    </div>
                    <button onclick="triggerPWAInstall()" class="px-3 py-1.5 bg-brand-glow text-brand-deep font-bold text-[10px] rounded-xl">Cài ngay</button>
                </div>
            </section>

            <section class="mb-5 mt-2">
                <div class="p-4 rounded-2xl bg-gradient-to-r from-brand-teal/10 to-indigo-500/10 border border-brand-teal/20 backdrop-blur-md">
                    <p class="text-xs text-brand-glow font-bold uppercase mb-1 flex items-center gap-2"><i class="bi bi-lightning-charge-fill"></i> Phương châm hoạt động</p>
                    <p class="text-sm text-slate-200 italic">"Kết nối – Điều hành – Chia sẻ – Hiệu quả"</p>
                </div>
            </section>

            <section class="grid grid-cols-2 gap-3 mb-6">
                <!-- Dashboard Items -->
                <div onclick="openModal('modal-generic')" class="group rounded-2xl bg-white/[0.03] border border-white/10 p-4 transition-all active:scale-[0.97]">
                    <div class="w-10 h-10 rounded-xl bg-blue-500/20 flex items-center justify-center text-blue-400 mb-3"><i class="bi bi-folder-fill"></i></div>
                    <h3 class="text-sm font-bold text-white">Văn bản</h3>
                </div>
                <div onclick="openModal('modal-generic')" class="group rounded-2xl bg-white/[0.03] border border-white/10 p-4 transition-all active:scale-[0.97]">
                    <div class="w-10 h-10 rounded-xl bg-emerald-500/20 flex items-center justify-center text-emerald-400 mb-3"><i class="bi bi-journal-bookmark-fill"></i></div>
                    <h3 class="text-sm font-bold text-white">Chuyên môn</h3>
                </div>
                <!-- Add more as needed -->
            </section>
        </main>

        <div id="modal-backdrop" onclick="closeModal()" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"></div>

        <!-- Generic Modal Structure -->
        <div id="modal-generic" class="fixed bottom-0 inset-x-0 z-50 max-h-[80vh] bg-brand-primary border-t border-white/10 rounded-t-[2rem] transform translate-y-full transition-transform duration-300">
            <div class="w-12 h-1.5 bg-slate-600 rounded-full mx-auto my-3"></div>
            <div class="px-6 pb-10 overflow-y-auto max-h-[70vh]">
                <h2 class="text-lg font-bold text-white mb-4">Chi tiết phân hệ</h2>
                <p class="text-slate-400">Nội dung đang được cập nhật...</p>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById('modal-backdrop').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('modal-backdrop').classList.replace('pointer-events-none', 'pointer-events-auto');
            document.getElementById(id).classList.replace('translate-y-full', 'translate-y-0');
        }

        function closeModal() {
            document.getElementById('modal-backdrop').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('modal-backdrop').classList.replace('pointer-events-auto', 'pointer-events-none');
            const modals = document.querySelectorAll('.fixed.bottom-0');
            modals.forEach(modal => modal.classList.replace('translate-y-0', 'translate-y-full'));
        }

        /* Logic for PWA */
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').classList.remove('hidden');
        });

        function triggerPWAInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            }
        }
    </script>
</body>
</html>
