<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HVA</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .page-container { width: 100%; max-width: 400px; }
        .login-card { background: #ffffff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 80px; height: 80px; background: #3b82f6; border-radius: 50%; margin: 0 auto 20px; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; }
        h1 { font-size: 24px; color: #1e293b; margin-bottom: 10px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; }
        input:focus { border-color: #3b82f6; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; }
    </style>
    <script>
        function handleLogin() {
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;
            
            // Tài khoản cá nhân của thầy:
            // Tài khoản: admin
            // Mật khẩu: HVA_123
            if (user === "admin" && pass === "HVA_123") {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'main.html';
            } else {
                alert("Sai tài khoản hoặc mật khẩu!");
            }
        }
    </script>
</head>
<body>

    <div class="page-container">
        <div class="login-card">
            <div class="logo">HVA</div>
            <h1>Chào mừng HVA</h1>
            <p>Vui lòng đăng nhập để tiếp tục</p>
            
            <input type="text" id="username" placeholder="Tài khoản">
            <input type="password" id="password" placeholder="Mật khẩu">
            
            <button onclick="handleLogin()">Đăng Nhập</button>
        </div>
    </div>

</body>
</html>
