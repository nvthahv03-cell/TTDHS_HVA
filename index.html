<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOC Hòa Vang | Trung tâm Điều hành số</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-950 min-h-screen font-sans p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        
        <!-- NÚT CÀI ĐẶT CỐ ĐỊNH -->
        <div class="text-center mb-8">
            <button onclick="alert('Hướng dẫn: Nhấn vào dấu 3 chấm (trên cùng bên phải) hoặc nút Chia sẻ, sau đó chọn Thêm vào Màn hình chính.')" 
                    class="bg-yellow-400 hover:bg-yellow-500 text-blue-950 font-bold py-3 px-6 rounded-full shadow-lg transition animate-pulse flex items-center justify-center gap-2 mx-auto">
                <span>📥</span> Bấm vào đây để cài App vào ĐT
            </button>
        </div>

        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">THPT HÒA VANG</h1>
            <p class="text-blue-200 font-medium mt-1">Trung tâm Điều hành số • Smart School</p>
        </header>

        <!-- Lưới nút -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <!-- (Giữ nguyên các nút như cũ) -->
            <button class="bg-white p-6 rounded-2xl shadow-lg text-center"><div class="text-3xl mb-2">📄</div><div class="font-bold text-sm">Văn bản</div></button>
            <button class="bg-white p-6 rounded-2xl shadow-lg text-center"><div class="text-3xl mb-2">📅</div><div class="font-bold text-sm">Lịch công tác</div></button>
            <button class="bg-white p-6 rounded-2xl shadow-lg text-center"><div class="text-3xl mb-2">🎓</div><div class="font-bold text-sm">Chuyên môn</div></button>
            <button class="bg-white p-6 rounded-2xl shadow-lg text-center"><div class="text-3xl mb-2">📚</div><div class="font-bold text-sm">Học liệu số</div></button>
            <button class="bg-white p-6 rounded-2xl shadow-lg text-center"><div class="text-3xl mb-2">📊</div><div class="font-bold text-sm">Báo cáo</div></button>
            <!-- Sửa nút số 8 thành Đoàn Thanh niên -->
<button onclick="window.location.href='https://thpthovang.danang.edu.vn/doan-thanh-nien'" 
        class="btn-card bg-white p-6 rounded-2xl shadow-lg border border-slate-200 text-center">
    <div class="text-3xl mb-2">🔥</div> <!-- Icon ngọn lửa cho Đoàn -->
    <div class="font-bold text-gray-800 text-sm">Đoàn Thanh niên</div>
</button>
            <button class="bg-white p-6 rounded-2xl shadow-lg text-center"><div class="text-3xl mb-2">🛠️</div><div class="font-bold text-sm">Quản trị CSVC</div></button>
            <button class="bg-white p-6 rounded-2xl shadow-lg text-center"><div class="text-3xl mb-2">🌐</div><div class="font-bold text-sm">Ứng dụng khác</div></button>
        </div>

        <!-- Khung Chat -->
        <div class="bg-white p-6 rounded-3xl shadow-2xl border border-blue-100">
            <div class="flex items-center gap-3 mb-4"><div class="text-2xl">🤖</div><h2 class="font-bold text-blue-900">HV Assistant</h2></div>
            <div class="flex gap-2"><input type="text" placeholder="Thầy cần tra cứu gì ạ?" class="flex-1 p-4 rounded-xl border border-gray-200 bg-gray-50"><button class="bg-blue-700 text-white px-6 py-4 rounded-xl font-bold">Gửi</button></div>
        </div>
    </div>
    <script>
    // Kiểm tra nếu ứng dụng đang chạy ở chế độ standalone (đã cài trên ĐT)
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        document.querySelector('.text-center.mb-8').style.display = 'none';
    }
</script>
</body>
</html>
