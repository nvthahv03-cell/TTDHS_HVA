<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOC Hòa Vang | Trung tâm Điều hành số</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a"> <!-- Màu thanh trạng thái trên điện thoại -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-card:hover { transform: translateY(-4px); transition: all 0.3s ease; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); }
    </style>
</head>
<!-- Nền trang: Màu xanh dương đậm (bg-blue-950) -->
<body class="bg-blue-950 min-h-screen font-sans p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header: Chữ màu trắng (text-white) -->
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">THPT HÒA VANG</h1>
            <p class="text-blue-200 font-medium mt-1">Trung tâm Điều hành số • Smart School</p>
        </header>

        <!-- Dashboard Grid (8 nút): Nền trắng, chữ đen -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <button class="btn-card bg-white p-6 rounded-2xl shadow-lg border border-slate-200 text-center">
                <div class="text-3xl mb-2">📄</div>
                <div class="font-bold text-gray-800 text-sm">Văn bản</div>
            </button>
            <button class="btn-card bg-white p-6 rounded-2xl shadow-lg border border-slate-200 text-center">
                <div class="text-3xl mb-2">📅</div>
                <div class="font-bold text-gray-800 text-sm">Lịch công tác</div>
            </button>
            <button class="btn-card bg-white p-6 rounded-2xl shadow-lg border border-slate-200 text-center">
                <div class="text-3xl mb-2">🎓</div>
                <div class="font-bold text-gray-800 text-sm">Chuyên môn</div>
            </button>
            <button class="btn-card bg-white p-6 rounded-2xl shadow-lg border border-slate-200 text-center">
                <div class="text-3xl mb-2">📚</div>
                <div class="font-bold text-gray-800 text-sm">Học liệu số</div>
            </button>
            <button class="btn-card bg-white p-6 rounded-2xl shadow-lg border border-slate-200 text-center">
                <div class="text-3xl mb-2">📊</div>
                <div class="font-bold text-gray-800 text-sm">Báo cáo</div>
            </button>
            <button class="btn-card bg-white p-6 rounded-2xl shadow-lg border border-slate-200 text-center">
                <div class="text-3xl mb-2">🤖</div>
                <div class="font-bold text-gray-800 text-sm">HV Assistant</div>
            </button>
            <button class="btn-card bg-white p-6 rounded-2xl shadow-lg border border-slate-200 text-center">
                <div class="text-3xl mb-2">🛠️</div>
                <div class="font-bold text-gray-800 text-sm">Quản trị CSVC</div>
            </button>
            <button class="btn-card bg-white p-6 rounded-2xl shadow-lg border border-slate-200 text-center">
                <div class="text-3xl mb-2">🌐</div>
                <div class="font-bold text-gray-800 text-sm">Ứng dụng khác</div>
            </button>
        </div>

        <!-- Chat Area: Nền trắng, bo góc -->
        <div class="bg-white p-6 rounded-3xl shadow-2xl border border-blue-100">
            <div class="flex items-center gap-3 mb-4">
                <div class="text-2xl">🤖</div>
                <h2 class="font-bold text-blue-900 text-lg">HV Assistant - Trợ lý số</h2>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Thầy cần tra cứu thông tin gì ạ?" class="flex-1 p-4 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-300 outline-none">
                <button class="bg-blue-700 hover:bg-blue-800 text-white px-6 py-4 rounded-xl font-bold transition">Gửi</button>
            </div>
        </div>
    </div>
</body>
</html>
