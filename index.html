<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HVA</title>
    <!-- Tích hợp Google Fonts cho phông chữ hiện đại hơn -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Poppins', sans-serif; 
        }

        body { 
            /* Hình nền Gradient hiện đại */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        .page-container { 
            width: 100%; 
            max-width: 420px; 
        }

        .login-card { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); /* Hiệu ứng kính */
            padding: 50px 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            text-align: center; 
            animation: fadeIn 0.6s ease-out; /* Hiệu ứng xuất hiện */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { 
            width: 80px; 
            height: 80px; 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            border-radius: 50%; 
            margin: 0 auto 24px; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            font-size: 28px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            letter-spacing: 1px;
        }

        h1 { 
            font-size: 26px; 
            color: #1e293b; 
            margin-bottom: 8px; 
            font-weight: 600;
        }

        p { 
            color: #64748b; 
            font-size: 14px; 
            margin-bottom: 35px; 
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #475569;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            outline: none; 
            font-size: 15px;
            transition: all 0.3s ease; 
            background-color: #f8fafc;
        }

        input:focus { 
            border-color: #3b82f6; 
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px;
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
    <script>
        function handleLogin() {
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;
            
            // Tài khoản cá nhân của thầy:
            // Tài khoản: admin
            // Mật khẩu: 123
            if (user === "admin" && pass === "123") {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'main.html';
            } else {
                alert("Sai tài khoản hoặc mật khẩu! Vui lòng thử lại.");
            }
        }

        // Bắt sự kiện nhấn phím Enter để đăng nhập tiện lợi hơn
        document.addEventListener("DOMContentLoaded", function() {
            var inputs = document.querySelectorAll('input');
            inputs.forEach(function(input) {
                input.addEventListener("keypress", function(event) {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        handleLogin();
                    }
                });
            });
        });
    </script>
</head>
<body>

    <div class="page-container">
        <div class="login-card">
            <div class="logo">HVA</div>
            <h1>Chào mừng trở lại</h1>
            <p>Vui lòng đăng nhập vào tài khoản của bạn</p>
            
            <div class="input-group">
                <label for="username">Tài khoản</label>
                <input type="text" id="username" placeholder="Nhập tài khoản của bạn" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
            </div>
            
            <button onclick="handleLogin()">Đăng Nhập</button>
        </div>
    </div>

</body>
</html>
