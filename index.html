<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOC Hòa Vang</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <header class="text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-900">THPT HÒA VANG</h1>
        <p class="text-sm text-blue-700">Trường học số • Trường học thông minh</p>
    </header>

    <!-- Khung lưới 8 nút -->
    <div class="grid grid-cols-4 gap-4 mb-8">
        <button class="bg-white p-4 rounded-xl shadow-md border-b-4 border-blue-500 text-center text-sm font-semibold text-gray-700">Văn bản</button>
        <button class="bg-white p-4 rounded-xl shadow-md border-b-4 border-green-500 text-center text-sm font-semibold text-gray-700">Lịch công tác</button>
        <button class="bg-white p-4 rounded-xl shadow-md border-b-4 border-indigo-500 text-center text-sm font-semibold text-gray-700">Chuyên môn</button>
        <button class="bg-white p-4 rounded-xl shadow-md border-b-4 border-purple-500 text-center text-sm font-semibold text-gray-700">Học liệu số</button>
        <button class="bg-white p-4 rounded-xl shadow-md border-b-4 border-yellow-500 text-center text-sm font-semibold text-gray-700">Báo cáo</button>
        <button class="bg-white p-4 rounded-xl shadow-md border-b-4 border-sky-500 text-center text-sm font-semibold text-gray-700">HV Assistant</button>
        <button class="bg-white p-4 rounded-xl shadow-md border-b-4 border-orange-500 text-center text-sm font-semibold text-gray-700">Quản trị CSVC</button>
        <button class="bg-white p-4 rounded-xl shadow-md border-b-4 border-gray-500 text-center text-sm font-semibold text-gray-700">Ứng dụng khác</button>
    </div>

    <!-- Khu vực HV Assistant -->
    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-200">
        <h2 class="font-bold text-blue-900 mb-2">🤖 HV Assistant</h2>
        <p class="text-sm text-gray-600 mb-4">Xin chào Thầy/Cô! Tôi có thể giúp gì cho thầy hôm nay?</p>
        <input type="text" placeholder="Nhập câu hỏi tại đây..." class="w-full p-3 rounded-lg border border-blue-300">
    </div>
</body>
</html>
