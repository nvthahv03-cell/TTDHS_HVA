<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TTDHS_HVA - Trung tâm Điều hành số</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-fixed { 
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 60; 
            background: #F8FAFC; border-top: 1px solid #E2E8F0; 
            border-radius: 28px 28px 0 0; transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); 
            max-height: 85vh; overflow-y: auto;
        }
        .modal-active { transform: translateY(0); }
    </style>
</head>
<body class="bg-[#F8FAFC] pb-20">

    <!-- Header -->
    <header class="sticky top-0 bg-white/90 backdrop-blur-xl border-b border-slate-200 px-5 py-4 z-40">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center text-white font-bold">HVA</div>
                <h1 class="font-bold text-lg">TTDHS_HVA</h1>
            </div>
            <button onclick="openModal('settings-modal')" class="text-2xl text-slate-600"><i class="bi bi-gear"></i></button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-5">
        <h2 class="text-2xl font-semibold mb-6">Chào Thầy/Cô!</h2>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="openModal('report-modal')" class="bg-white p-6 rounded-3xl border border-slate-200 text-left shadow-sm">
                <div class="text-4xl mb-3">📊</div>
                <span class="font-semibold">Báo cáo</span>
            </button>
            <button onclick="openModal('settings-modal')" class="bg-white p-6 rounded-3xl border border-slate-200 text-left shadow-sm">
                <div class="text-4xl mb-3">⚙️</div>
                <span class="font-semibold">Cài đặt</span>
            </button>
        </div>
    </main>

    <!-- Modal Backdrop -->
    <div id="modal-backdrop" onclick="closeModal()" class="fixed inset-0 bg-black/50 opacity-0 pointer-events-none transition-opacity z-50"></div>

    <!-- Modal Báo cáo -->
    <div id="report-modal" class="modal-fixed">
        <div class="p-5">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Báo cáo trực tuyến</h2>
                <button onclick="closeModal()" class="text-2xl">×</button>
            </div>
            <div class="space-y-4">
                <div class="p-4 bg-white rounded-2xl border">Tình hình lên lớp</div>
                <div class="p-4 bg-white rounded-2xl border">Ghi sổ đầu bài</div>
                <div class="p-4 bg-white rounded-2xl border">Tiến độ kế hoạch</div>
                <button onclick="closeModal()" class="w-full py-3 bg-slate-200 rounded-xl font-bold">Đóng</button>
            </div>
        </div>
    </div>

    <!-- Modal Cài đặt -->
    <div id="settings-modal" class="modal-fixed">
        <div class="p-5">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Cài đặt</h2>
                <button onclick="closeModal()" class="text-2xl">×</button>
            </div>
            <div class="space-y-4">
                <div class="flex justify-between p-4 bg-white rounded-2xl border">
                    <span>Thông báo</span>
                    <input type="checkbox" checked class="w-6 h-6">
                </div>
                <button onclick="closeModal()" class="w-full py-3 bg-sky-600 text-white rounded-xl font-bold">Lưu</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.add('modal-active');
            document.getElementById('modal-backdrop').classList.remove('opacity-0', 'pointer-events-none');
        }
        function closeModal() {
            document.querySelectorAll('.modal-fixed').forEach(m => m.classList.remove('modal-active'));
            document.getElementById('modal-backdrop').classList.add('opacity-0', 'pointer-events-none');
        }
    </script>
</body>
</html>
