<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOC Hòa Vang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-hover:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="bg-slate-100 p-6">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-900">THPT HÒA VANG</h1>
            <p class="text-blue-600 font-medium">Trung tâm Điều hành số • Smart School</p>
        </header>

        <!-- Lưới 4x2 với kích thước cố định -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
            <button class="btn-hover bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-500 text-center font-bold text-gray-700">Văn bản</button>
            <button class="btn-hover bg-white p-6 rounded-2xl shadow-lg border-t-4 border-green-500 text-center font-bold text-gray-700">Lịch công tác</button>
            <button class="btn-hover bg-white p-6 rounded-2xl shadow-lg border-t-4 border-indigo-500 text-center font-bold text-gray-700">Chuyên môn</button>
            <button class="btn-hover bg-white p-6 rounded-2xl shadow-lg border-t-4 border-purple-500 text-center font-bold text-gray-700">Học liệu số</button>
            <button class="btn-hover bg-white p-6 rounded-2xl shadow-lg border-t-4 border-yellow-500 text-center font-bold text-gray-700">Báo cáo</button>
            <button class="btn-hover bg-white p-6 rounded-2xl shadow-lg border-t-4 border-sky-500 text-center font-bold text-gray-700">HV Assistant</button>
            <button class="btn-hover bg-white p-6 rounded-2xl shadow-lg border-t-4 border-orange-500 text-center font-bold text-gray-700">Quản trị CSVC</button>
            <button class="btn-hover bg-white p-6 rounded-2xl shadow-lg border-t-4 border-gray-500 text-center font-bold text-gray-700">Ứng dụng khác</button>
        </div>

        <!-- Khung chat -->
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-blue-100">
            <h2 class="font-bold text-blue-900 mb-4 flex items-center gap-2">🤖 HV Assistant - Trợ lý số</h2>
            <div class="flex gap-2">
                <input type="text" placeholder="Thầy cần hỗ trợ gì ạ?" class="flex-1 p-4 rounded-xl border border-gray-200 bg-gray-50">
                <button class="bg-blue-600 text-white px-6 py-4 rounded-xl font-bold">Gửi</button>
            </div>
        </div>
    </div>
</body>
</html>
