<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IOC Hòa Vang | Trung tâm Điều hành số</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-btn {
            background-color: white; padding: 1.5rem; border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); text-align: center;
            font-weight: 700; color: #1e3a8a; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
        }
        .nav-btn:hover { background-color: #f3f4f6; transform: scale(1.02); }
        .icon-size { width: 32px; height: 32px; }
    </style>
</head>
<body class="bg-[#0f2a58] p-4">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-white">THPT HÒA VANG</h1>
            <p class="text-blue-200">Trung tâm Điều hành số</p>
        </header>

        <div class="grid grid-cols-2 gap-4">
            <!-- Văn bản -->
            <button onclick="window.location.href='#'" class="nav-btn">
                <svg class="icon-size" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Văn bản
            </button>
            <!-- Lịch công tác -->
            <button onclick="window.location.href='#'" class="nav-btn">
                <svg class="icon-size" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Lịch công tác
            </button>
            <!-- Chuyên môn -->
            <button onclick="openSubmenu('chuyenmon')" class="nav-btn">
                <svg class="icon-size" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg>
                Chuyên môn
            </button>
            <!-- Học liệu số -->
            <button onclick="window.location.href='#'" class="nav-btn">
                <svg class="icon-size" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                Học liệu số
            </button>
            <!-- Báo cáo TT -->
            <button onclick="openSubmenu('baocao')" class="nav-btn">
                <svg class="icon-size" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Báo cáo TT
            </button>
            <!-- Thi đua -->
            <button onclick="window.location.href='#'" class="nav-btn">
                <svg class="icon-size" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
                Thi đua
            </button>
            <!-- CSVC -->
            <button onclick="window.location.href='#'" class="nav-btn">
                <svg class="icon-size" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                CSVC
            </button>
            <!-- Đoàn TN -->
            <button onclick="window.location.href='#'" class="nav-btn">
                <svg class="icon-size" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                Đoàn TN
            </button>
        </div>
    </div>

    <!-- Modal giữ nguyên như cũ -->
    <div id="submenu-modal" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
            <div class="flex justify-between mb-4 border-b pb-2">
                <h2 id="modal-title" class="text-lg font-bold">Menu</h2>
                <button onclick="closeSubmenu()" class="text-xl">&times;</button>
            </div>
            <div id="modal-content" class="grid gap-2"></div>
        </div>
    </div>

    <script>
        const menuConfig = {
            'chuyenmon': { title: 'Quản lý Chuyên môn', links: [{name:'Kế hoạch',url:'#'},{name:'Sáng kiến',url:'#'}] },
            'baocao': { title: 'Báo cáo', links: [{name:'Báo cáo tuần',url:'#'},{name:'Báo cáo chuyên đề',url:'#'}] }
        };
        function openSubmenu(id) {
            const data = menuConfig[id];
            document.getElementById('modal-title').innerText = data.title;
            const container = document.getElementById('modal-content');
            container.innerHTML = '';
            data.links.forEach(l => {
                const a = document.createElement('a');
                a.href = l.url; a.className = 'p-3 bg-gray-100 rounded text-center'; a.innerText = l.name;
                container.appendChild(a);
            });
            document.getElementById('submenu-modal').classList.remove('hidden');
        }
        function closeSubmenu() { document.getElementById('submenu-modal').classList.add('hidden'); }
    </script>
</body>
</html>
