<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - HVA Digital Transformation</title>
    <style>
        /* 1. Reset và cài đặt nền tảng */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
        }
        
        body { 
            background-color: #f0f2f5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }

        /* 2. Khung chứa giao diện */
        .page-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        /* 3. Card đăng nhập */
        .login-card {
            background: #ffffff;
            padding: 50px; 
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            text-align: center; 
            border: 1px solid #e2e8f0;
        }

        /* 4. Logo và Tiêu đề */
        .logo-placeholder { 
            width: 90px; height: 90px; 
            background: #3b82f6; 
            border-radius: 50%; 
            margin: 0 auto 24px; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 32px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
        
        h1 { color: #1e293b; font-size: 28px; margin-bottom: 12px; font-weight: 700; }
        p.slogan { color: #64748b; font-size: 15px; font-style: italic; margin-bottom: 35px; }
        p.instruction { color: #334155; font-size: 16px; margin-bottom: 25px; line-height: 1.4; }

        /* 5. Inputs và Button */
        input {
            width: 100%; 
            padding: 16px 20px; 
            margin-bottom: 20px;
            border: 1.5px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 15px;
            outline: none; 
            transition: border 0.3s;
        }
        input:focus { border-color: #3b82f6; }

        button {
            width: 100%; 
            padding: 16px; 
            background: #3b82f6; 
            color: white;
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer;
            margin-top: 10px; 
            transition: all 0.3s; 
            font-size: 16px;
        }
        button:hover { 
            background: #2563eb; 
            transform: translateY(-1px); 
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); 
        }
    </style>
</head>
<body>

    <div class="page-container">
        <div class="login-card">
            <!-- Phần Logo -->
            <div class="logo-placeholder">HVA</div>
            
            <!-- Phần nội dung -->
            <h1>Chào mừng đến với HVA</h1>
            <p class="slogan">"Tiên phong chuyển đổi, kết nối tương lai."</p>
            <p class="instruction">Mời thầy/cô nhập tài khoản để trải nghiệm HVA</p>
            
            <!-- Form đăng nhập -->
            <input type="text" placeholder="Tài khoản giáo viên">
            <input type="password" placeholder="Mật khẩu">
            
            <button>Đăng Nhập</button>
        </div>
    </div>

</body>
</html>
